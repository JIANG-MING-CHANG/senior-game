    <!-- 引入 Tailwind CSS 進行美化 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 React 與 ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- 引入 Babel 進行即時編譯 -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        /* 鎖定螢幕，防止長輩在手機上誤觸選取、放大畫面或下拉重整 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100dvh; /* 動態視窗高度，完美避開手機瀏覽器網址列 */
            overflow: hidden; /* 隱藏全部捲軸 */
            overscroll-behavior: none; /* 防止 iOS 滑動回彈效應 */
            user-select: none;
            -webkit-user-select: none;
            touch-action: none; /* 鎖定預設觸控行為 (如雙擊放大、平移) */
            background-color: #FFFBF5;
        }
        #root {
            width: 100%;
            height: 100%;
        }
    </style>
</head>

        const GAME2_LEVELS = [
          { level: 1, time: 60, pairs: [

            { food: '菠菜 🥬', nutrient: '鐵質 (預防貧血)' },
            { food: '香蕉 🍌', nutrient: '鉀離子 (穩定血壓)' }
          ]},
          { level: 3, time: 40, pairs: [

          ]},
          { level: 4, time: 30, pairs: [
            { food: '番茄 🍅', nutrient: '茄紅素 (保護攝護腺)' },
            { food: '香菇 🍄', nutrient: '維生素D (幫助鈣吸收)' },

          ]},
          { level: 5, time: 25, pairs: [
            { food: '酪梨 🥑', nutrient: '單元不飽和脂肪 (清血管)' },
            { food: '藍莓 🫐', nutrient: '花青素 (防大腦退化)' },
            { food: '無糖優格 🥣', nutrient: '益生菌 (維持腸道健康)' }
          ]},
          { level: 6, time: 25, pairs: [
            { food: '豆腐 🧊', nutrient: '植物性蛋白 (修復組織)' },
            { food: '奇異果 🥝', nutrient: '維生素C (促進膠原蛋白)' },
            { food: '黑芝麻 ⚫', nutrient: '高鈣 (預防骨鬆)' }
          ]},
          { level: 7, time: 25, pairs: [
            { food: '燕麥 🥣', nutrient: '水溶性纖維 (降膽固醇)' },
            { food: '南瓜 🎃', nutrient: 'β-胡蘿蔔素 (黏膜健康)' },
            { food: '芭樂 🍐', nutrient: '維生素C (抗氧化)' }
          ]},
          { level: 8, time: 20, pairs: [
            { food: '苦瓜 🥒', nutrient: '維生素C (降火氣)' },
            { food: '黑豆 🫘', nutrient: '花青素 (保護心血管)' },
            { food: '豬肝 🥩', nutrient: '鐵質 (紅血球製造)' }
          ]},
          { level: 9, time: 20, pairs: [
            { food: '綠茶 🍵', nutrient: '兒茶素 (抗老防癌)' },
            { food: '奇亞籽 🌱', nutrient: 'Omega-3 (抗發炎)' },
            { food: '木瓜 🥭', nutrient: '木瓜酵素 (幫助消化)' }
          ]},
          { level: 10, time: 20, pairs: [
            { food: '牡蠣 🦪', nutrient: '鋅 (維持免疫與味覺)' },
            { food: '鯖魚 🐟', nutrient: 'DHA (活化大腦)' },
            { food: '堅果 🌰', nutrient: '鎂 (幫助放鬆睡眠)' }
          ]}
        ];

        // ==========================================
        // 2. 音效生成器 (Web Audio API) & 語音
        // ==========================================
        let audioCtx = null;
        const initAudio = () => {
          if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          if (audioCtx.state === 'suspended') audioCtx.resume();
        };

        const playSound = (type) => {
          if (!audioCtx) return;
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.connect(gain);
          gain.connect(audioCtx.destination);

          const now = audioCtx.currentTime;
          if (type === 'success') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, now);
            osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
            gain.gain.setValueAtTime(0.5, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
            osc.start(now);
            osc.stop(now + 0.3);
          } else if (type === 'fail') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(200, now);
            osc.frequency.exponentialRampToValueAtTime(150, now + 0.3);
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
            osc.start(now);
            osc.stop(now + 0.3);
          } else if (type === 'win') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(400, now);
            osc.frequency.setValueAtTime(500, now + 0.1);
            osc.frequency.setValueAtTime(600, now + 0.2);
            osc.frequency.setValueAtTime(800, now + 0.3);
            gain.gain.setValueAtTime(0.5, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
            osc.start(now);
            osc.stop(now + 0.6);
          }
        };

        const speak = (text) => {
          if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-TW';
            utterance.rate = 1.0; 
            window.speechSynthesis.speak(utterance);
          }
        };

        // ==========================================
        // 3. 子遊戲組件
        // ==========================================
        function Game1Basket({ level, setLevel, score, updateScore, showFeedback, onGameOver, playerName }) {
          const currentLevelData = GAME1_LEVELS[level - 1];
          const containerRef = useRef(null);
          const [basketX, setBasketX] = useState(50);
          const basketXRef = useRef(50);
          const [items, setItems] = useState([]);
          const [timeLeft, setTimeLeft] = useState(currentLevelData.time);
          const [isPlaying, setIsPlaying] = useState(true);

          const handleMove = useCallback((e) => {
            if (!containerRef.current || !isPlaying) return;
            const rect = containerRef.current.getBoundingClientRect();
            let clientX = e.clientX;
            if (e.touches && e.touches.length > 0) {
              clientX = e.touches[0].clientX;
            }
            let x = ((clientX - rect.left) / rect.width) * 100;
            x = Math.max(5, Math.min(95, x)); 
            setBasketX(x);
            basketXRef.current = x;
          }, [isPlaying]);

          useEffect(() => {
            if (!isPlaying) return;
            const spawnInterval = setInterval(() => {
              const randomItem = currentLevelData.items[Math.floor(Math.random() * currentLevelData.items.length)];
              setItems(prev => [...prev, {
                id: Date.now() + Math.random(),
                x: Math.random() * 80 + 10,
                y: -10,
                ...randomItem
              }]);
            }, currentLevelData.spawnRate);
            return () => clearInterval(spawnInterval);
          }, [level, isPlaying, currentLevelData]);

          useEffect(() => {
            if (!isPlaying) return;
            const moveInterval = setInterval(() => {
              setItems(prev => {
                let newItems = [];
                prev.forEach(item => {
                  const newY = item.y + currentLevelData.speed;
                  if (newY >= 85 && newY <= 95 && Math.abs(item.x - basketXRef.current) < 15) {
                    if (item.type === 'healthy') {
                      updateScore(10 * level);
                      showFeedback(`⭕ 答對了！+${10 * level}分 (${item.name})`, 'success', '接得好');
                    } else {
                      updateScore(-10);
                      showFeedback(`❌ 接錯了！扣10分 (${item.name})`, 'fail', '小心喔，這個不健康');
                    }
                  } else if (newY < 110) {
                    newItems.push({ ...item, y: newY });
                  } else {
                    if (item.type === 'healthy') {
                      updateScore(-5);
                      showFeedback(`⚠️ 漏接健康食物！扣5分`, 'fail', '哎呀，漏接了');
                    }
                  }
                });
                return newItems;
              });
            }, 50);
            return () => clearInterval(moveInterval);
          }, [level, isPlaying, currentLevelData.speed, updateScore, showFeedback]);

          useEffect(() => {
            if (!isPlaying) return;
            if (timeLeft <= 0) {
              setIsPlaying(false);
              playSound('win');
              if (level < GAME1_LEVELS.length) {
                showFeedback('🎉 恭喜過關！難度增加囉！', 'win', '恭喜過關，繼續挑戰下一關！');
                setTimeout(() => {
                  setLevel(level + 1);
                  setTimeLeft(GAME1_LEVELS[level].time);
                  setItems([]);
                  setIsPlaying(true);
                }, 3000);
              } else {
                showFeedback('🏆 恭喜全破關！', 'win', '太棒了，全部挑戰成功！');
                setTimeout(onGameOver, 3000);
              }
              return;
            }
            const timer = setInterval(() => setTimeLeft(prev => prev - 1), 1000);
            return () => clearInterval(timer);
          }, [timeLeft, isPlaying, level, setLevel, onGameOver, showFeedback]);

          return (
            <div 
              className="w-full h-full max-h-[900px] max-w-4xl rounded-2xl md:rounded-3xl shadow-2xl relative overflow-hidden border-4 md:border-8 border-orange-400 flex flex-col bg-orange-50"
              style={{
                backgroundImage: "url('image1.jpg')",
                backgroundSize: 'cover',
                backgroundPosition: 'center'
              }}
            >
              {/* 半透明遮罩層 */}
              <div className="absolute inset-0 bg-white/70 backdrop-blur-sm z-0 pointer-events-none"></div>

              {/* 頂部狀態列：使用 RWD 字體大小，確保小螢幕不破版 */}
              <div className="bg-orange-100/90 p-2 md:p-4 flex justify-between items-center border-b-4 border-orange-300 z-10 relative flex-shrink-0">
                <div className="text-base sm:text-xl md:text-3xl font-bold text-orange-700">第 {level} 關</div>
                <div className="text-base sm:text-xl md:text-3xl font-bold text-red-600">總分：{score}</div>
                <div className="text-base sm:text-xl md:text-3xl font-bold text-blue-600">⏳ {timeLeft} 秒</div>
              </div>
              
              {/* 遊戲可互動區域 */}
              <div 
                ref={containerRef}
                className="flex-1 relative cursor-pointer touch-none z-10 w-full min-h-0"
                onMouseMove={handleMove}
                onTouchMove={handleMove}
              >
                <div className="absolute inset-0 flex items-center justify-center opacity-10 pointer-events-none">
                  <span className="text-8xl sm:text-9xl">🛒</span>
                </div>
                {items.map(item => (
                  <div 
                    key={item.id} 
                    className="absolute text-4xl sm:text-5xl md:text-6xl drop-shadow-md transition-transform"
                    style={{ left: `${item.x}%`, top: `${item.y}%`, transform: 'translate(-50%, -50%)' }}
                  >
                    {item.emoji}
                  </div>
                ))}
                <div 
                  className="absolute text-5xl sm:text-6xl md:text-7xl drop-shadow-2xl transition-all duration-75 ease-out pointer-events-none"
                  style={{ left: `${basketX}%`, bottom: '5%', transform: 'translateX(-50%)' }}
                >
                  🧺
                </div>
              </div>
              
              {!isPlaying && (
                <div className="absolute inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-20">
                  <div className="text-3xl sm:text-4xl md:text-6xl font-black text-white drop-shadow-lg animate-pulse text-center px-4">
                    {level === GAME1_LEVELS.length && timeLeft <= 0 ? '遊戲完成！結算中...' : '🎉 準備進入下一關...'}
                  </div>
                </div>
              )}
            </div>
          );
        }

        // ==========================================
        // 遊戲二 營養連連看 (華麗卡片 RWD 版)
        // ==========================================
        function Game2Match({ level, setLevel, score, updateScore, showFeedback, onGameOver }) {
          const currentLevelData = GAME2_LEVELS[level - 1];
          const [timeLeft, setTimeLeft] = useState(currentLevelData.time);
          const [isPlaying, setIsPlaying] = useState(true);
          const [chances, setChances] = useState(3); 
          
          const shuffleArray = (array) => [...array].sort(() => Math.random() - 0.5);

          const [leftItems, setLeftItems] = useState([]);
          const [rightItems, setRightItems] = useState([]);
          
          const [selectedLeft, setSelectedLeft] = useState(null);
          const [selectedRight, setSelectedRight] = useState(null);
          const [matchedPairs, setMatchedPairs] = useState([]);

          useEffect(() => {
            const pairs = currentLevelData.pairs;
            setLeftItems(shuffleArray(pairs.map(p => p.food)));
            setRightItems(shuffleArray(pairs.map(p => p.nutrient)));
            setMatchedPairs([]);
            setSelectedLeft(null);
            setSelectedRight(null);
            setTimeLeft(currentLevelData.time);
            setChances(3);
            setIsPlaying(true);
          }, [level, currentLevelData]);

          useEffect(() => {
            if (selectedLeft && selectedRight) {
              const isCorrect = currentLevelData.pairs.some(
                p => p.food === selectedLeft && p.nutrient === selectedRight
              );

              if (isCorrect) {
                setMatchedPairs(prev => [...prev, selectedLeft, selectedRight]);
                updateScore(100);
                showFeedback(`⭕ 答對了！+100分`, 'success', '答對了，太棒了');
              } else {
                setChances(prev => prev - 1);
                updateScore(-50);
                showFeedback('❌ 連錯了！扣50分', 'fail', '哎呀，連錯了，再試一次');
              }
              setTimeout(() => {
                setSelectedLeft(null);
                setSelectedRight(null);
              }, 500);
            }
          }, [selectedLeft, selectedRight, currentLevelData, updateScore, showFeedback]);

          useEffect(() => {
            if (!isPlaying) return;
            if (matchedPairs.length === currentLevelData.pairs.length * 2) {
              setIsPlaying(false);
              playSound('win');
              if (level < GAME2_LEVELS.length) {
                showFeedback('🎉 恭喜過關！難度增加囉！', 'win', '順利過關，繼續挑戰');
                setTimeout(() => { setLevel(level + 1); }, 3000);
              } else {
                showFeedback('🏆 恭喜全破關！', 'win', '太厲害了，全部破關');
                setTimeout(onGameOver, 3000);
              }
            } else if (chances <= 0) {
              setIsPlaying(false);
              showFeedback('⏱️ 三次機會用完！跳下一關', 'fail', '機會用完了，我們換下一關');
              setTimeout(() => {
                if (level < GAME2_LEVELS.length) {
                  setLevel(level + 1);
                } else {
                  onGameOver();
                }
              }, 3000);
            }
          }, [matchedPairs, chances, isPlaying, level, setLevel, onGameOver, currentLevelData.pairs.length, showFeedback]);

          useEffect(() => {
            if (!isPlaying) return;
            if (timeLeft <= 0) {
              setIsPlaying(false);
              showFeedback('⏰ 時間到！跳下一關！', 'fail', '時間到了，換下一關');
              setTimeout(() => {
                if (level < GAME2_LEVELS.length) {
                  setLevel(level + 1);
                } else {
                  onGameOver();
                }
              }, 3000);
              return;
            }
            const timer = setInterval(() => setTimeLeft(prev => prev - 1), 1000);
            return () => clearInterval(timer);
          }, [timeLeft, isPlaying, level, setLevel, onGameOver, showFeedback]);

          const parseFood = (str) => {
            const parts = str.trim().split(' ');
            return { name: parts[0], emoji: parts.slice(1).join(' ') || '🍽️' };
          };

          const parseNutrient = (str) => {
            const parts = str.split(' (');
            const title = parts[0];
            const desc = parts.length > 1 ? parts[1].replace(')', '') : '';
            let icon = '✨';
            if (str.includes('骨')) icon = '🦴';
            else if (str.includes('肉') || str.includes('蛋白')) icon = '💪';
            else if (str.includes('心') || str.includes('血')) icon = '🫀';
            else if (str.includes('腦') || str.includes('神經')) icon = '🧠';
            else if (str.includes('眼') || str.includes('視')) icon = '👁️';
            else if (str.includes('便') || str.includes('腸') || str.includes('消化')) icon = '🚽';
            else if (str.includes('攝護腺') || str.includes('黏膜') || str.includes('免疫') || str.includes('防癌')) icon = '🛡️';
            return { title, desc, icon };
          };

          return (
            // 外層 RWD 設計：使用 flex-1, w-full, h-full 確保自動充滿畫面並處理縮放
            <div className="w-full h-full max-h-[900px] max-w-5xl bg-[#FFFBF5] rounded-2xl md:rounded-3xl shadow-2xl overflow-hidden border-4 md:border-8 border-orange-200 flex flex-col relative">
              
              {/* 四周的裝飾葉片與元素 */}
              <div className="absolute top-0 left-0 text-4xl sm:text-6xl opacity-20 pointer-events-none transform -translate-x-2 -translate-y-2">🌿</div>
              <div className="absolute top-0 right-0 text-4xl sm:text-6xl opacity-20 pointer-events-none transform translate-x-2 -translate-y-2">🍃</div>
              <div className="absolute bottom-0 left-0 text-4xl sm:text-6xl opacity-20 pointer-events-none transform -translate-x-2 translate-y-2">🌱</div>
              <div className="absolute bottom-0 right-0 text-4xl sm:text-6xl opacity-20 pointer-events-none transform translate-x-2 translate-y-2">☘️</div>

              {/* 頂部狀態列 */}
              <div className="bg-orange-100 p-2 md:p-4 flex flex-wrap justify-between items-center border-b-4 border-orange-200 gap-1 md:gap-2 relative z-10 flex-shrink-0">
                <div className="text-sm sm:text-xl md:text-3xl font-bold text-orange-800">第 {level} 關</div>
                <div className="text-sm sm:text-xl md:text-3xl font-bold text-red-600">總分：{score}</div>
                <div className="text-sm sm:text-xl md:text-3xl font-bold text-rose-600">❤️ 機會：{chances}/3</div>
                <div className="text-sm sm:text-xl md:text-3xl font-bold text-blue-600">⏳ {timeLeft} 秒</div>
              </div>

              {/* 遊戲標題區：壓縮間距以適應小螢幕 */}
              <div className="flex flex-col items-center justify-center pt-2 sm:pt-4 md:pt-6 pb-1 sm:pb-3 relative z-10 flex-shrink-0">
                <div className="bg-orange-500 text-white px-3 sm:px-5 py-0.5 sm:py-1 rounded-full text-xs sm:text-lg md:text-xl font-bold mb-1 sm:mb-2 shadow-md">
                  食尚樂齡大挑戰
                </div>
                <h2 className="text-2xl sm:text-4xl md:text-5xl font-black text-rose-600 mb-2 sm:mb-4 tracking-wide drop-shadow-sm">
                  營養連連看
                </h2>
                <div className="bg-yellow-100 px-3 sm:px-6 py-1 sm:py-2 rounded-full border border-yellow-300 shadow-inner">
                  <p className="text-xs sm:text-lg md:text-xl font-bold text-teal-800 leading-none">點擊左邊「食物」配對右邊「好處」！</p>
                </div>
              </div>

              {/* 連連看主畫面區：使用 flex-1 動態適應剩餘高度，且內容垂直均勻分佈 */}
              <div className="p-2 sm:p-4 md:p-8 flex-1 flex justify-between items-center relative min-h-0 z-10 w-full">
                
                {/* 左側：美味食物 */}
                <div className="w-[45%] flex flex-col justify-evenly h-full gap-2 sm:gap-4">
                  {leftItems.map((item, idx) => {
                    const isSelected = selectedLeft === item;
                    const isMatched = matchedPairs.includes(item);
                    const { name, emoji } = parseFood(item);
                    
                    return (
                      <button
                        key={`left-${idx}`}
                        disabled={isMatched || (!isPlaying)}
                        onClick={() => setSelectedLeft(item)}
                        className={`flex items-center p-1 sm:p-2 md:p-4 rounded-xl md:rounded-2xl transition-all transform w-full text-left
                          ${isMatched ? 'opacity-40 grayscale border-gray-200 bg-gray-100 shadow-none cursor-not-allowed scale-[0.98]' : 
                            isSelected ? 'bg-yellow-50 border-2 sm:border-4 border-yellow-400 scale-105 shadow-md md:shadow-xl' : 
                            'bg-orange-50 hover:bg-orange-100 hover:scale-[1.02] border border-orange-200 shadow-sm md:shadow-md'}`}
                      >
                        <div className="bg-white rounded-full w-8 h-8 sm:w-12 sm:h-12 md:w-16 md:h-16 flex items-center justify-center text-lg sm:text-3xl md:text-4xl mr-1 sm:mr-2 md:mr-4 shadow-sm flex-shrink-0 border border-orange-100">
                          {emoji}
                        </div>
                        <div className="flex flex-col justify-center overflow-hidden">
                          <span className="text-[11px] sm:text-xl md:text-2xl font-bold text-gray-800 leading-tight break-words">{name}</span>
                          <span className="text-[9px] sm:text-sm md:text-base font-semibold text-orange-600 mt-0.5 sm:mt-1 hidden sm:block truncate">優質食材選擇</span>
                        </div>
                      </button>
                    );
                  })}
                </div>

                {/* 中間裝飾圖示 (交換箭頭) */}
                <div className="w-[8%] flex items-center justify-center pointer-events-none">
                  <span className="text-2xl sm:text-4xl md:text-6xl text-gray-300 font-black">⇆</span>
                </div>

                {/* 右側：健康好處 */}
                <div className="w-[45%] flex flex-col justify-evenly h-full gap-2 sm:gap-4">
                  {rightItems.map((item, idx) => {
                    const isSelected = selectedRight === item;
                    const isMatched = matchedPairs.includes(item);
                    const { title, desc, icon } = parseNutrient(item);
                    
                    return (
                      <button
                        key={`right-${idx}`}
                        disabled={isMatched || (!isPlaying)}
                        onClick={() => setSelectedRight(item)}
                        className={`flex items-center p-1 sm:p-2 md:p-4 rounded-xl md:rounded-2xl transition-all transform w-full text-left
                          ${isMatched ? 'opacity-40 grayscale border-gray-200 bg-gray-100 shadow-none cursor-not-allowed scale-[0.98]' : 
                            isSelected ? 'bg-yellow-50 border-2 sm:border-4 border-yellow-400 scale-105 shadow-md md:shadow-xl' : 
                            'bg-teal-50 hover:bg-teal-100 hover:scale-[1.02] border border-teal-200 shadow-sm md:shadow-md'}`}
                      >
                        <div className="bg-white rounded-full w-8 h-8 sm:w-12 sm:h-12 md:w-16 md:h-16 flex items-center justify-center text-lg sm:text-3xl md:text-4xl mr-1 sm:mr-2 md:mr-4 shadow-sm flex-shrink-0 border border-teal-100">
                          {icon}
                        </div>
                        <div className="flex flex-col justify-center overflow-hidden">
                          <span className="text-[11px] sm:text-lg md:text-xl font-bold text-gray-800 leading-tight break-words">{title}</span>
                          <span className="text-[9px] sm:text-sm md:text-base font-semibold text-teal-600 mt-0.5 sm:mt-1 leading-tight break-words">{desc}</span>
                        </div>
                      </button>
                    );
                  })}
                </div>
              </div>

              {/* 底部進度文字 */}
              <div className="text-center pb-2 sm:pb-4 md:pb-6 z-10 flex-shrink-0">
                <span className="text-xs sm:text-xl md:text-2xl font-bold text-gray-600 bg-white px-3 sm:px-6 py-1 sm:py-2 rounded-full shadow-sm border border-gray-100">
                  目前配對成功： {matchedPairs.length / 2} / {currentLevelData.pairs.length}
                </span>
              </div>

              {/* 遮罩狀態 */}
              {!isPlaying && matchedPairs.length === currentLevelData.pairs.length * 2 && (
                <div className="absolute inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-20 rounded-2xl md:rounded-3xl">
                  <div className="text-3xl sm:text-4xl md:text-6xl font-black text-white drop-shadow-lg animate-pulse text-center px-2">🎉 準備進入下一關...</div>
                </div>
              )}
              {!isPlaying && chances <= 0 && (
                <div className="absolute inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-20 rounded-2xl md:rounded-3xl">
                  <div className="text-3xl sm:text-4xl md:text-6xl font-black text-white drop-shadow-lg animate-pulse text-center px-2">⏱️ 機會用盡，換下一關...</div>
                </div>
              )}
              {!isPlaying && timeLeft <= 0 && chances > 0 && matchedPairs.length !== currentLevelData.pairs.length * 2 && (
                <div className="absolute inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-20 rounded-2xl md:rounded-3xl">
                  <div className="text-3xl sm:text-4xl md:text-6xl font-black text-white drop-shadow-lg animate-pulse text-center px-2">⏰ 時間到，換下一關...</div>
                </div>
              )}
            </div>
          );
        }

        // ==========================================
        // 4. 主應用程式
        // ==========================================
        function App() {
          const [screen, setScreen] = useState('login'); 
          const [playerName, setPlayerName] = useState('');
          const [score, setScore] = useState(0);
          const [level, setLevel] = useState(1);
          const [gameMessage, setGameMessage] = useState('');
          const messageTimeoutRef = useRef(null);
          
          const updateScore = useCallback((points) => {
            setScore(prev => {
              if (points < 0 && prev < 100) return prev;
              let newScore = prev + points;
              return newScore < 0 ? 0 : newScore; 
            });
          }, []);

          const showFeedback = useCallback((msg, type, speechText = '') => {
            playSound(type);
            if (speechText) speak(speechText);
            setGameMessage(msg);
            if (messageTimeoutRef.current) clearTimeout(messageTimeoutRef.current);
            messageTimeoutRef.current = setTimeout(() => setGameMessage(''), 1500);
          }, []);

          const startGame = (type) => {
            initAudio();
            setLevel(1);
            setScore(0);
            setScreen(type);
          };

          return (
            // 讓整個 App 元件也是滿版，使用 h-full 確保沒有多餘捲軸
            <div className="w-full h-full flex flex-col items-center justify-center p-2 sm:p-4 max-w-6xl mx-auto">
              
              {/* 浮動提示訊息調整為適應手機大小 */}
              {gameMessage && (
                <div className="fixed top-10 sm:top-20 left-1/2 transform -translate-x-1/2 z-50 bg-white/95 px-4 sm:px-6 py-2 sm:py-4 rounded-2xl sm:rounded-3xl shadow-2xl border-2 sm:border-4 border-yellow-400 animate-bounce transition-all w-[90%] md:w-auto">
                  <h2 className="text-lg sm:text-2xl md:text-4xl font-bold text-center text-rose-600 leading-tight">{gameMessage}</h2>
                </div>
              )}

              {screen === 'login' && (
                <div className="bg-white p-6 sm:p-10 rounded-2xl sm:rounded-3xl shadow-2xl w-full max-w-xl text-center border-4 sm:border-8 border-green-300 max-h-full overflow-y-auto">
                  <h1 className="text-3xl sm:text-4xl md:text-5xl font-extrabold text-green-600 mb-4 sm:mb-8 drop-shadow-md">🌿 樂齡智活闖關</h1>
                  <p className="text-lg sm:text-xl md:text-2xl mb-4 sm:mb-6 text-gray-600 font-bold">阿公阿嬤您好！<br/>請輸入您的尊姓大名：</p>
                  <input 
                    type="text" 
                    className="w-full text-2xl sm:text-3xl md:text-4xl p-3 sm:p-4 border-2 sm:border-4 border-blue-300 rounded-xl sm:rounded-2xl mb-6 sm:mb-8 text-center focus:outline-none focus:border-green-500"
                    placeholder="例如：王大明"
                    value={playerName}
                    onChange={(e) => setPlayerName(e.target.value)}
                  />
                  <button 
                    onClick={() => {
                      if(playerName.trim() === '') { alert('請輸入姓名喔！'); return; }
                      initAudio();
                      setScreen('menu');
                    }}
                    className="w-full bg-gradient-to-r from-green-400 to-blue-500 text-white text-2xl sm:text-3xl md:text-4xl font-bold py-4 sm:py-5 rounded-xl sm:rounded-2xl shadow-lg transform transition active:scale-95"
                  >
                    🌟 開始進入遊戲 🌟
                  </button>
                </div>
              )}

              {screen === 'menu' && (
                <div className="bg-white p-6 sm:p-8 rounded-2xl sm:rounded-3xl shadow-2xl w-full max-w-2xl text-center border-4 sm:border-8 border-blue-300 max-h-full overflow-y-auto">
                  <h1 className="text-2xl sm:text-3xl md:text-4xl font-bold text-blue-700 mb-4 sm:mb-6">歡迎，{playerName}！</h1>
                  <p className="text-lg sm:text-xl md:text-3xl mb-6 sm:mb-10 text-gray-700 font-semibold">今天想玩哪個遊戲來活動大腦呢？</p>
                  <div className="flex flex-col gap-4 sm:gap-6">
                    <button 
                      onClick={() => startGame('game1')}
                      className="w-full bg-gradient-to-r from-orange-400 to-red-400 text-white text-xl sm:text-2xl md:text-4xl font-bold py-4 sm:py-6 md:py-8 rounded-2xl sm:rounded-3xl shadow-xl transform transition active:scale-95"
                    >
                      🛒 樂齡健康菜籃族
                      <p className="text-sm sm:text-lg md:text-xl mt-1 sm:mt-2 font-normal">接住健康食物，閃避不健康食物</p>
                    </button>
                    <button 
                      onClick={() => startGame('game2')}
                      className="w-full bg-gradient-to-r from-teal-400 to-emerald-500 text-white text-xl sm:text-2xl md:text-4xl font-bold py-4 sm:py-6 md:py-8 rounded-2xl sm:rounded-3xl shadow-xl transform transition active:scale-95"
                    >
                      🔗 食品營養連連看
                      <p className="text-sm sm:text-lg md:text-xl mt-1 sm:mt-2 font-normal">將食物與對應的營養素連起來</p>
                    </button>
                  </div>
                </div>
              )}

              {screen === 'game1' && (
                <Game1Basket level={level} setLevel={setLevel} score={score} updateScore={updateScore} showFeedback={showFeedback} onGameOver={() => setScreen('result')} playerName={playerName} />
              )}

              {screen === 'game2' && (
                <Game2Match level={level} setLevel={setLevel} score={score} updateScore={updateScore} showFeedback={showFeedback} onGameOver={() => setScreen('result')} />
              )}

              {screen === 'result' && (
                <div className="bg-white p-6 sm:p-10 rounded-2xl sm:rounded-3xl shadow-2xl w-full max-w-xl text-center border-4 sm:border-8 border-yellow-400 max-h-full overflow-y-auto">
                  <h1 className="text-5xl sm:text-6xl mb-4 sm:mb-6">🎉</h1>
                  <h2 className="text-3xl sm:text-4xl md:text-5xl font-extrabold text-rose-600 mb-4 sm:mb-6">遊戲結束！</h2>
                  <p className="text-xl sm:text-2xl md:text-4xl text-blue-700 font-bold mb-2 sm:mb-4">{playerName} 您的總分是</p>
                  <p className="text-5xl sm:text-6xl md:text-7xl font-black text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-600 mb-6 sm:mb-8">{score} 分</p>
                  <div className="bg-yellow-100 p-4 sm:p-6 rounded-xl sm:rounded-2xl mb-6 sm:mb-8">
                    <p className="text-lg sm:text-2xl md:text-3xl font-bold text-gray-800">
                      {score >= 800 ? '太厲害了！知識與反應滿分！🥇' : 
                       score >= 300 ? '表現很棒喔！多多練習會更厲害！🌟' : 
                       '不要氣餒，再接再厲！活動大腦就是最棒的運動！💪'}
                    </p>
                  </div>
                  <button 
                    onClick={() => setScreen('menu')}
                    className="w-full bg-gradient-to-r from-blue-500 to-purple-500 text-white text-2xl sm:text-3xl md:text-4xl font-bold py-4 sm:py-5 rounded-xl sm:rounded-2xl shadow-lg transform transition active:scale-95"
                  >
                    🏠 回到主選單
                  </button>
                </div>
              )}
            </div>
          );
        }

        // 渲染到根節點
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
